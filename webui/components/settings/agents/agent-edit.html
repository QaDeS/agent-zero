<html>
<head>
  <title>Edit Agent Profile</title>
  <script type="module">
    import { store } from "/components/settings/agents/agents-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.agents && $store.agents.selectedAgent">
      <div class="agent-edit-content">
        
        <!-- Loading State -->
        <template x-if="$store.agents.isLoading">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading agent profile...</p>
          </div>
        </template>

        <!-- Edit Form -->
        <template x-if="!$store.agents.isLoading">
          <div class="edit-form">
            
            <!-- Basic Info Section -->
            <div class="form-section">
              <h3 class="section-title">Basic Information</h3>
              
              <div class="form-group">
                <label for="agent-title">Title</label>
                <input 
                  type="text" 
                  id="agent-title"
                  x-model="$store.agents.selectedAgent.title"
                  class="form-input"
                  placeholder="Agent display name"
                >
              </div>

              <div class="form-group">
                <label for="agent-description">Description</label>
                <input 
                  type="text" 
                  id="agent-description"
                  x-model="$store.agents.selectedAgent.description"
                  class="form-input"
                  placeholder="Brief description of this agent's purpose"
                >
              </div>

              <div class="form-group">
                <label for="agent-context">Context</label>
                <textarea 
                  id="agent-context"
                  x-model="$store.agents.selectedAgent.context"
                  class="form-textarea"
                  rows="3"
                  placeholder="Context instructions for when to use this agent"
                ></textarea>
                <small class="form-help">This helps other agents know when to delegate to this agent.</small>
              </div>
            </div>

            <!-- Model Overrides Section -->
            <div class="form-section">
              <h3 class="section-title">Model Overrides</h3>
              <p class="section-description">
                Configure custom AI models for this agent role. Leave fields empty to use global defaults.
              </p>

              <!-- Chat Model Override -->
              <div class="model-override-card">
                <h4 class="model-title">
                  <span>💬 Chat Model</span>
                  <small>Main conversation model</small>
                </h4>
                <div class="model-fields">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Provider</label>
                      <select x-model="$store.agents.selectedAgent.chat_model.provider" class="form-select">
                        <option value="">-- Use Default --</option>
                        <template x-for="provider in $store.agents.chatProviders" :key="provider.value">
                          <option :value="provider.value" x-text="provider.label"></option>
                        </template>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Model Name</label>
                      <input 
                        type="text" 
                        x-model="$store.agents.selectedAgent.chat_model.name"
                        class="form-input"
                        placeholder="e.g., gpt-4o, claude-3.5-sonnet"
                      >
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>Context Length</label>
                      <input 
                        type="number" 
                        x-model="$store.agents.selectedAgent.chat_model.ctx_length"
                        class="form-input"
                        placeholder="e.g., 128000"
                      >
                    </div>
                    <div class="form-group checkbox-group">
                      <label class="checkbox-label">
                        <input 
                          type="checkbox" 
                          x-model="$store.agents.selectedAgent.chat_model.vision"
                          :checked="$store.agents.selectedAgent.chat_model.vision === true"
                          @change="$store.agents.selectedAgent.chat_model.vision = $event.target.checked"
                        >
                        Supports Vision
                      </label>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Additional Parameters (kwargs)</label>
                    <textarea 
                      x-model="$store.agents.selectedAgent.chat_model.kwargs"
                      class="form-textarea code-textarea"
                      rows="2"
                      placeholder="temperature=0.7&#10;max_tokens=4096"
                    ></textarea>
                    <small class="form-help">Format: KEY=VALUE per line, or valid JSON object</small>
                  </div>
                </div>
              </div>

              <!-- Utility Model Override -->
              <div class="model-override-card">
                <h4 class="model-title">
                  <span>🔧 Utility Model</span>
                  <small>For memory, summarization, etc.</small>
                </h4>
                <div class="model-fields">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Provider</label>
                      <select x-model="$store.agents.selectedAgent.utility_model.provider" class="form-select">
                        <option value="">-- Use Default --</option>
                        <template x-for="provider in $store.agents.chatProviders" :key="provider.value">
                          <option :value="provider.value" x-text="provider.label"></option>
                        </template>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Model Name</label>
                      <input 
                        type="text" 
                        x-model="$store.agents.selectedAgent.utility_model.name"
                        class="form-input"
                        placeholder="e.g., gpt-4o-mini"
                      >
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Additional Parameters (kwargs)</label>
                    <textarea 
                      x-model="$store.agents.selectedAgent.utility_model.kwargs"
                      class="form-textarea code-textarea"
                      rows="2"
                      placeholder="temperature=0.2"
                    ></textarea>
                    <small class="form-help">Format: KEY=VALUE per line, or valid JSON object</small>
                  </div>
                </div>
              </div>

              <!-- Embeddings Model Override -->
              <div class="model-override-card">
                <h4 class="model-title">
                  <span>📊 Embeddings Model</span>
                  <small>For vector embeddings</small>
                </h4>
                <div class="model-fields">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Provider</label>
                      <select x-model="$store.agents.selectedAgent.embeddings_model.provider" class="form-select">
                        <option value="">-- Use Default --</option>
                        <template x-for="provider in $store.agents.embeddingProviders" :key="provider.value">
                          <option :value="provider.value" x-text="provider.label"></option>
                        </template>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Model Name</label>
                      <input 
                        type="text" 
                        x-model="$store.agents.selectedAgent.embeddings_model.name"
                        class="form-input"
                        placeholder="e.g., text-embedding-3-small"
                      >
                    </div>
                  </div>
                </div>
              </div>

              <!-- Browser Model Override -->
              <div class="model-override-card">
                <h4 class="model-title">
                  <span>🌐 Browser Model</span>
                  <small>For web browsing tasks</small>
                </h4>
                <div class="model-fields">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Provider</label>
                      <select x-model="$store.agents.selectedAgent.browser_model.provider" class="form-select">
                        <option value="">-- Use Default --</option>
                        <template x-for="provider in $store.agents.chatProviders" :key="provider.value">
                          <option :value="provider.value" x-text="provider.label"></option>
                        </template>
                      </select>
                    </div>
                    <div class="form-group">
                      <label>Model Name</label>
                      <input 
                        type="text" 
                        x-model="$store.agents.selectedAgent.browser_model.name"
                        class="form-input"
                        placeholder="e.g., gpt-4o"
                      >
                    </div>
                  </div>
                  <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                      <input 
                        type="checkbox" 
                        x-model="$store.agents.selectedAgent.browser_model.vision"
                        :checked="$store.agents.selectedAgent.browser_model.vision === true"
                        @change="$store.agents.selectedAgent.browser_model.vision = $event.target.checked"
                      >
                      Use Vision for Browser
                    </label>
                    <small class="form-help">Enables screenshot analysis for web pages</small>
                  </div>
                </div>
              </div>

            </div>

            <!-- Action Buttons -->
            <div class="form-actions">
              <button type="button" class="btn btn-cancel" @click="$store.agents.cancelEdit()">
                Cancel
              </button>
              <button type="button" class="btn btn-save" @click="$store.agents.confirmEdit()">
                Save Changes
              </button>
            </div>

          </div>
        </template>

      </div>
    </template>
  </div>

  <style>
    .agent-edit-content {
      padding: var(--spacing-md);
      max-width: 900px;
      margin: 0 auto;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-xl);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: var(--spacing-md);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
    }

    .form-section {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      background: var(--color-panel);
    }

    .section-title {
      margin: 0 0 var(--spacing-md) 0;
      font-size: 1.2em;
      color: var(--color-text);
      border-bottom: 1px solid var(--color-border);
      padding-bottom: var(--spacing-sm);
    }

    .section-description {
      margin: calc(-1 * var(--spacing-sm)) 0 var(--spacing-md) 0;
      color: var(--color-text-secondary);
      font-size: 0.9em;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
      margin-bottom: var(--spacing-md);
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    label {
      font-weight: 500;
      color: var(--color-text);
      font-size: 0.9em;
    }

    .form-input,
    .form-select,
    .form-textarea {
      padding: var(--spacing-sm);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 0.95em;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .form-textarea {
      resize: vertical;
      font-family: inherit;
    }

    .code-textarea {
      font-family: var(--font-mono, monospace);
      font-size: 0.85em;
    }

    .form-help {
      color: var(--color-text-tertiary);
      font-size: 0.8em;
    }

    .checkbox-group {
      flex-direction: row;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      cursor: pointer;
      font-weight: normal;
    }

    .checkbox-label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .model-override-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      background: var(--color-surface);
    }

    .model-override-card:last-child {
      margin-bottom: 0;
    }

    .model-title {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin: 0 0 var(--spacing-md) 0;
      font-size: 1em;
    }

    .model-title small {
      color: var(--color-text-tertiary);
      font-weight: normal;
    }

    .model-fields {
      padding-left: var(--spacing-sm);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--color-border);
    }

    .btn {
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text);
      cursor: pointer;
      font-size: 0.95em;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: var(--color-border);
    }

    .btn-save {
      background: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .btn-save:hover {
      background: var(--color-primary-hover, var(--color-primary));
    }

    .btn-cancel:hover {
      background: var(--color-surface-hover, var(--color-border));
    }
  </style>
</body>
</html>
